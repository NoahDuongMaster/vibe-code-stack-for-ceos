syntax = "proto3";

package api.v1;

// Request/response contracts shared by every microservice and client.
// One source of truth, gRPC- and Connect-compatible.

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
  string upper = 2;
  int32 length = 3;
  string runtime = 4;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string runtime = 3;
}

// The core API served identically on every runtime (Node, Cloudflare Workers).
service ApiService {
  rpc Echo(EchoRequest) returns (EchoResponse) {}
  rpc Health(HealthRequest) returns (HealthResponse) {}
}
