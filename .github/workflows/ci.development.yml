name: CI Development

on:
  push:
    branches: [develop]

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build (Development)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_PROJECT_NAME: dev-build
          NEXT_PUBLIC_API_ENDPOINT: https://api.dev.example.com
          NEXT_PUBLIC_BASE_URL: https://dev.example.com
          SESSION_SECRET: ci-placeholder-secret-32-chars!!
