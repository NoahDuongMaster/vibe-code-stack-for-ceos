name: ✨ Feature Request
description: Suggest an idea or improvement for this project
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe the problem and the outcome you'd like.
  - type: dropdown
    id: workspace
    attributes:
      label: Target workspace
      description: Where would this feature live? (matches the commit scope)
      options:
        - "apps/dapp — @repo/web (Next.js / vinext)"
        - "apps/admin — @repo/admin (React / Rsbuild)"
        - "apps/landing — @repo/landing (Astro)"
        - "services/api-node — @repo/api-node (Connect RPC, Node)"
        - "services/api-gateway — @repo/gateway-cf (Connect RPC, Workers)"
        - "packages — protocol / api-core / api-client (shared)"
        - "Tooling — CI / Docker / config / scripts"
        - "New workspace"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Ex. "I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or links about the feature request.
    validations:
      required: false
