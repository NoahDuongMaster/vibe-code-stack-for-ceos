# Automated dependency updates.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # ── JavaScript / TypeScript (pnpm workspace — single root lockfile) ──
  # `directories` (not `directory`) so Dependabot reads every workspace
  # package.json, not just the root's 5 devDependencies — otherwise next,
  # react, astro, hono-style deps in apps/services/packages never get update
  # PRs at all (all versions resolve against the one shared root lockfile).
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/apps/*"
      - "/services/*"
      - "/packages/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    # Batch updates to cut PR noise; majors stay separate for manual review.
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      development-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    ignore:
      # Framework majors are breaking — bump these deliberately, not automatically.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ──
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]

  # ── Docker base images ──
  - package-ecosystem: "docker"
    directories:
      - "/docker/production"
      - "/docker/staging"
      - "/docker/development"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build"
