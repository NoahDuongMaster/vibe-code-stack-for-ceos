[pr_reviewer]
extra_instructions = """
This is a Next.js 15 App Router project with vertical slice architecture.

Check these architecture rules strictly:
1. `app/` imports ONLY from `features/[name]/index.ts` — never deep into feature internals
2. `features/` imports from `shared/` but NEVER from other features
3. `features/[name]/_components/` and `_hooks/` are PRIVATE — only within that feature
4. `shared/` NEVER imports from `features/` or `app/`
5. `server/lib/` is server-only — NEVER in Client Components or `shared/`
6. Feature adapters call `shared/lib/xhr.ts` — never `fetch()` directly

Also check:
- No `any` or `as any` — use `unknown` + type guard
- No `console.log` — use logger
- No default exports on non-page files
- No `'use client'` on layout.tsx
- No raw `fetch()` in components — use TanStack Query + service
- No `dangerouslySetInnerHTML` without DOMPurify
- No hardcoded URLs — use API_ROUTES / WEB_ROUTES
- No `process.env.X` directly — use env configuration
"""
num_code_suggestions = 3
require_security_review = true
require_estimate_effort_to_review = false

[pr_description]
generate_ai_title = true
use_bullet_points = true
extra_instructions = """
Follow commit convention: type(scope): description
Types: feat|fix|hotfix|docs|style|refactor|perf|test|build|ci|chore
"""

[pr_code_suggestions]
num_code_suggestions = 3
extra_instructions = """
Suggest improvements following project conventions:
- Zod schemas with Z prefix, derived types with T prefix
- Services orchestrate adapters, adapters handle HTTP
- Server Actions return { success, data?, error? } via next-safe-action
- Use semantic HTML for accessibility (WCAG 2.2 AA)
"""
